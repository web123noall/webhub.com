<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oản Tù Tì Wide Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-navy: #0a192f; --card-navy: #112240; --neon-blue: #00d2ff;
            --white: #e6f1ff; --gold: #f1c40f; --red: #ff4757;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Oswald', sans-serif; background-color: var(--bg-navy);
            color: var(--white); display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0; padding: 10px;
            overflow: hidden; user-select: none;
        }

        /* --- UI WIDE X 1.4 --- */
        .navbar { width: 100%; max-width: 728px; display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .balance-box { 
            color: var(--gold); font-size: 26px; font-family: 'Roboto Mono', monospace; 
            background: var(--card-navy); padding: 8px 25px; border-radius: 16px; border: 2px solid var(--gold);
        }

        .game-frame {
            width: 100%; max-width: 728px; padding: 21px; background-color: var(--card-navy); 
            border-radius: 35px; border: 2px solid var(--neon-blue);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* Nút Trang Chủ nằm trong bàn chơi */
        .btn-home {
            position: absolute; top: 18px; left: 18px; color: var(--neon-blue);
            border: 2px solid var(--neon-blue); padding: 6px 16px; border-radius: 8px;
            font-size: 14px; text-decoration: none; text-transform: uppercase; font-weight: bold;
            z-index: 10; background: var(--bg-navy); transition: 0.2s;
        }
        .btn-home:hover { background: var(--neon-blue); color: var(--bg-navy); }

        .timer-box { font-size: 50px; color: var(--red); font-weight: 800; margin-bottom: 8px; line-height: 1; }

        .arena {
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(10, 25, 47, 0.95); padding: 21px; border-radius: 28px;
            width: 100%; position: relative; border: 2px solid rgba(0, 210, 255, 0.4); 
            margin-bottom: 21px; height: 196px;
        }

        #game-status-msg {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            background: var(--bg-navy); border: 2px solid var(--neon-blue);
            padding: 6px 28px; border-radius: 16px; font-size: 18px;
            color: var(--neon-blue); text-transform: uppercase; white-space: nowrap; z-index: 5;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
        }

        /* Cảnh báo to dễ nhìn */
        .warning-msg {
            font-size: 24px !important;
            padding: 10px 40px !important;
            background: #ff4757 !important;
            color: #fff !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px #ff4757 !important;
            transform: translateX(-50%) scale(1.15) !important;
            z-index: 20 !important;
        }

        .hand-side { display: flex; flex-direction: column; align-items: center; width: 168px; }
        .hand-icon { font-size: 91px; filter: drop-shadow(0 0 12px rgba(255,255,255,0.1)); }
        .hand-label { font-size: 16px; color: var(--white); margin-top: 7px; opacity: 0.6; font-weight: bold; letter-spacing: 1px; }
        .vs-text { font-size: 45px; color: var(--gold); font-weight: 900; font-style: italic; }

        .result-overlay {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 77px; font-weight: 900; opacity: 0; pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 10; background: rgba(10, 25, 47, 0.97); border-radius: 28px;
        }
        .result-overlay.active { opacity: 1; transform: scale(1); }
        .win-text { color: var(--gold); text-shadow: 0 0 30px var(--gold); } 
        .lose-text { color: var(--red); text-shadow: 0 0 30px var(--red); }
        .draw-text { color: var(--white); text-shadow: 0 0 30px var(--white); }

        .controls { display: flex; gap: 21px; justify-content: center; width: 100%; }
        .choice-btn {
            background: var(--bg-navy); border: 2px solid rgba(0, 210, 255, 0.4);
            border-radius: 22px; padding: 16px; cursor: pointer; transition: 0.2s;
            flex: 1; max-width: 140px; text-align: center;
        }
        .choice-btn:hover { border-color: var(--neon-blue); transform: translateY(-4px); }
        .choice-btn.selected { border-color: var(--gold); background: rgba(241, 196, 15, 0.15); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        .choice-btn .icon { font-size: 53px; }
        .choice-btn .name { font-size: 18px; font-weight: bold; color: var(--white); margin-top: 4px; }

        /* --- BETTING AREA WIDE X 1.4 --- */
        .betting-area {
            background: var(--card-navy); padding: 21px; border-radius: 35px;
            border: 1px solid rgba(230, 241, 255, 0.15); 
            width: 100%; max-width: 728px; margin-top: 16px;
            display: flex; flex-direction: column; align-items: center;
        }

        .bet-input {
            width: 80%; background: var(--bg-navy); border: 2px solid var(--neon-blue);
            color: var(--gold); font-size: 36px; padding: 11px; border-radius: 16px;
            font-family: 'Roboto Mono', monospace; text-align: center; outline: none; margin-bottom: 16px;
        }

        .btn-group { display: flex; gap: 11px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .btn-quick {
            background: rgba(230, 241, 255, 0.05); border: 1px solid rgba(230, 241, 255, 0.3); 
            color: var(--white); padding: 11px 19px; font-size: 18px; border-radius: 11px; 
            cursor: pointer; font-weight: bold; transition: 0.2s; flex-grow: 1; max-width: 119px;
        }
        .btn-quick:hover { background: var(--neon-blue); color: var(--bg-navy); }
        .btn-allin { background: var(--gold); color: var(--bg-navy); border: none; max-width: 140px; }
        .btn-cancel { background: var(--red); color: var(--white); border: none; max-width: 140px; }

        .disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.8); }
    </style>
</head>
<body>
    <div class="navbar"><div class="balance-box" id="global-balance">💰 5,000,000</div></div>

    <div class="game-frame">
        <a href="index.html" class="btn-home">⬅ TRANG CHỦ</a>
        <div class="timer-box" id="timer-display">20s</div>
        <div class="arena">
            <div id="game-status-msg">CHỜ RA CHIÊU...</div>
            <div class="hand-side"><div class="hand-icon" id="player-hand">❔</div><div class="hand-label">BẠN</div></div>
            <div class="vs-text">VS</div>
            <div class="hand-side"><div class="hand-icon" id="bot-hand">❔</div><div class="hand-label">MÁY</div></div>
            <div id="result-overlay" class="result-overlay"></div>
        </div>
        <div class="controls" id="controls">
            <div class="choice-btn" id="btn-keo" onclick="selectHand('keo')"><div class="icon">✌️</div><div class="name">KÉO</div></div>
            <div class="choice-btn" id="btn-bua" onclick="selectHand('bua')"><div class="icon">✊</div><div class="name">BÚA</div></div>
            <div class="choice-btn" id="btn-bao" onclick="selectHand('bao')"><div class="icon">🖐️</div><div class="name">BAO</div></div>
        </div>
    </div>

    <div class="betting-area" id="betting-area">
        <input type="text" id="bet-amount" class="bet-input" placeholder="0" oninput="handleInput(this)">
        <div class="btn-group">
            <button class="btn-quick" onclick="addBet(100000)">+100K</button>
            <button class="btn-quick" onclick="addBet(500000)">+500K</button>
            <button class="btn-quick" onclick="addBet(1000000)">+1M</button>
            <button class="btn-quick" onclick="addBet(5000000)">+5M</button>
            <button class="btn-quick btn-allin" onclick="allIn()">TẤT TAY</button>
            <button class="btn-quick btn-cancel" onclick="cancelBet()">HỦY</button>
        </div>
    </div>

    <script>
        // --- QUẢN LÝ TIỀN ---
        let currentBet = 0; 
        
        function getBalance() {
            let b = localStorage.getItem('userBalance');
            if (b === null) { localStorage.setItem('userBalance', '5000000'); return 5000000; }
            return parseInt(b);
        }
        
        function updateUI() { 
            let displayedBalance = getBalance() - currentBet;
            document.getElementById('global-balance').innerText = "💰 " + displayedBalance.toLocaleString(); 
        }
        function saveBalance(a) { localStorage.setItem('userBalance', a.toString()); updateUI(); }
        updateUI();

        let timeLeft = 20; let isPlaying = true; let playerChoice = null;
        let playerHistory = [];
        const hands = { 'keo': '✌️', 'bua': '✊', 'bao': '🖐️' };
        const winMap = { 'keo': 'bao', 'bua': 'keo', 'bao': 'bua' };

        function handleInput(el) {
            let v = parseInt(el.value.replace(/,/g, '')) || 0;
            let b = getBalance(); if (v > b) v = b;
            el.value = v > 0 ? v.toLocaleString() : "";
            currentBet = v; 
            updateUI();
        }
        function addBet(a) {
            let c = currentBet;
            let b = getBalance(); let n = Math.min(c + a, b);
            currentBet = n;
            document.getElementById('bet-amount').value = n.toLocaleString();
            updateStatusMsg("MỨC CƯỢC: " + n.toLocaleString());
            updateUI();
        }
        function allIn() { 
            let b = getBalance();
            currentBet = b;
            document.getElementById('bet-amount').value = b.toLocaleString(); 
            updateStatusMsg("ALL-IN!");
            updateUI();
        }
        function cancelBet() {
            currentBet = 0; 
            document.getElementById('bet-amount').value = ""; playerChoice = null;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('player-hand').innerText = "❔";
            updateStatusMsg("ĐÃ HỦY CƯỢC");
            updateUI();
        }
        function updateStatusMsg(m) { document.getElementById('game-status-msg').innerText = m; }

        function selectHand(c) {
            if (!isPlaying) return;
            if (currentBet <= 0) { 
                let msgEl = document.getElementById('game-status-msg');
                msgEl.innerText = "⚠️ HÃY CƯỢC TRƯỚC!";
                msgEl.classList.add('warning-msg');
                setTimeout(() => msgEl.classList.remove('warning-msg'), 1500); 
                return; 
            }
            playerChoice = c;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-' + c).classList.add('selected');
            document.getElementById('player-hand').innerText = hands[c];
            updateStatusMsg("ĐÃ CHỌN: " + c.toUpperCase());
            document.getElementById('game-status-msg').classList.remove('warning-msg'); 
        }

        let gameTimer = setInterval(() => {
            if (isPlaying) {
                timeLeft--; document.getElementById('timer-display').innerText = timeLeft + "s";
                if (timeLeft <= 0) resolve();
            }
        }, 1000);

        function resolve() {
            isPlaying = false;
            document.getElementById('controls').classList.add('disabled');
            document.getElementById('betting-area').classList.add('disabled');
            let bal = getBalance();

            if (!playerChoice || currentBet <= 0) {
                currentBet = 0; 
                updateUI();
                showRes("MISS", "draw-text"); updateStatusMsg("BỎ LỠ VÁN - HOÀN TIỀN");
                setTimeout(reset, 3000); return;
            }

            // --- BOT LOGIC MỚI: KHÓ ĐOÁN VÀ "KHÔN" HƠN ---
            let bot;
            let botRand = Math.random();
            
            if (botRand < 0.35) {
                // Khó hơn: 35% tỷ lệ Boss "nhìn thấu" và ra chiêu khắc chế trực tiếp lựa chọn (Boss auto thắng)
                bot = Object.keys(winMap).find(k => winMap[k] === playerChoice);
            } else if (botRand < 0.50 && playerHistory.length >= 1) {
                // Đánh lừa tâm lý: 15% tỷ lệ Boss ra lại đúng chiêu mà bạn vừa ra ở ván trước
                bot = playerHistory[playerHistory.length - 1];
            } else {
                // 50% Random hoàn toàn để người chơi không thể tìm ra quy luật cố định
                bot = ['keo', 'bua', 'bao'][Math.floor(Math.random() * 3)];
            }
            // ---------------------------------------------
            
            playerHistory.push(playerChoice);
            if (playerHistory.length > 5) playerHistory.shift();

            document.getElementById('bot-hand').innerText = hands[bot];

            let betAmount = currentBet;
            currentBet = 0; 

            if (playerChoice === bot) {
                showRes("HÒA", "draw-text"); updateStatusMsg("HÒA VỐN");
                saveBalance(bal); 
            } else if (winMap[playerChoice] === bot) {
                showRes("THẮNG", "win-text"); saveBalance(bal + betAmount); 
                updateStatusMsg("+" + betAmount.toLocaleString());
            } else {
                showRes("THUA", "lose-text"); saveBalance(bal - betAmount); 
                updateStatusMsg("-" + betAmount.toLocaleString());
            }
            
            setTimeout(reset, 4000);
        }

        function showRes(t, c) {
            let o = document.getElementById('result-overlay');
            o.innerText = t; o.className = "result-overlay active " + c;
        }
        function reset() {
            timeLeft = 20; isPlaying = true; playerChoice = null;
            currentBet = 0;
            document.getElementById('player-hand').innerText = "❔";
            document.getElementById('bot-hand').innerText = "❔";
            document.getElementById('bet-amount').value = ""; 
            document.getElementById('result-overlay').classList.remove('active');
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('controls').classList.remove('disabled');
            document.getElementById('betting-area').classList.remove('disabled');
            updateStatusMsg("VÁN MỚI BẮT ĐẦU!");
            updateUI();
        }
    </script>
</body>
</html>
