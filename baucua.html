<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bầu Cua Tôm Cá - Sapphire Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TÔNG MÀU XANH SAPPHIRE SANG TRỌNG */
            --bg-color: #060f1e; 
            --panel-bg: rgba(15, 23, 42, 0.7); 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --blue-accent: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8; 
            --danger: #f43f5e;
            --success: #10b981;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, var(--bg-color) 80%);
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            user-select: none;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 30px; box-sizing: border-box; }
        .btn-back { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn-back:hover { color: var(--gold); }
        .balance-container { display: flex; align-items: center; gap: 15px; }
        .balance-box { color: var(--gold); font-size: 24px; font-family: 'Roboto Mono', monospace; font-weight: 700; text-shadow: 0 0 15px var(--gold-glow); background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border-color); }

        .main-container { display: flex; gap: 30px; width: 100%; max-width: 1200px; align-items: flex-start; justify-content: center; }

        /* BÀN CHƠI LỆCH TRÁI */
        .game-area { display: flex; flex-direction: column; align-items: center; flex-grow: 1; max-width: 800px; }

        .status-board { width: 100%; padding: 20px 30px; text-align: center; margin-bottom: 25px; box-sizing: border-box; border-top: 2px solid var(--blue-accent); }
        .status-text { font-size: 20px; letter-spacing: 4px; text-transform: uppercase; font-weight: 800; margin-bottom: 15px; color: var(--gold); }
        .timer-wrapper { display: flex; align-items: center; gap: 15px; width: 100%; }
        .timer-bar-bg { flex-grow: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .timer-bar-fill { height: 100%; width: 100%; background: var(--blue-accent); box-shadow: 0 0 10px var(--blue-accent); transition: width 1s linear; }
        .timer-number { font-size: 18px; font-family: 'Roboto Mono', monospace; font-weight: 700; width: 40px; text-align: right; color: var(--text-main); }

        .dice-container { display: flex; gap: 20px; margin-bottom: 35px; padding: 25px 50px; background: radial-gradient(circle, var(--blue-glow) 0%, transparent 80%); border: 1px solid rgba(59, 130, 246, 0.2); }
        .dice { width: 85px; height: 85px; background: #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 55px; box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .shake { animation: shake 0.12s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }

        .chip-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .chip { background: rgba(0,0,0,0.5); color: var(--text-muted); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: 50px; font-size: 16px; font-family: 'Roboto Mono', monospace; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .chip.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px var(--gold-glow); transform: translateY(-4px); }
        .chip:hover:not(.locked):not(.active) { border-color: var(--blue-accent); color: #fff; }

        .betting-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-bottom: 30px; }
        .bet-cell { background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; position: relative; transition: 0.2s; }
        .bet-cell:hover:not(.locked) { border-color: var(--blue-accent); background: rgba(59, 130, 246, 0.05); }
        .bet-cell.has-bet { border-color: var(--gold); background: rgba(212, 175, 55, 0.08); box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.05); }
        .cell-icon { font-size: 55px; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .cell-name { font-size: 15px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 15px; }
        .bet-amount { background: #000; color: var(--gold); padding: 6px 14px; border-radius: 6px; font-family: 'Roboto Mono', monospace; font-size: 14px; display: inline-block; min-width: 50px; font-weight: 700; border: 1px solid rgba(212,175,55,0.2); }

        .locked { pointer-events: none; opacity: 0.5; filter: grayscale(50%); }

        .controls { display: flex; gap: 15px; width: 100%; justify-content: flex-end; }
        .btn-clear { padding: 12px 30px; font-size: 14px; font-family: 'Montserrat', sans-serif; font-weight: 700; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; background: rgba(244, 63, 94, 0.1); color: var(--danger); letter-spacing: 1px; }
        .btn-clear:hover:not(:disabled) { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-clear:disabled { background: transparent; color: #444; border-color: #222; cursor: not-allowed; }

        /* BẢNG CẦU TO BÊN PHẢI */
        .sidebar-history { width: 360px; flex-shrink: 0; }
        .history-board { padding: 25px; height: 100%; box-sizing: border-box; border-left: 2px solid var(--blue-accent); }
        .history-title { font-size: 18px; color: var(--gold); margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; text-align: center; }
        .history-list { display: flex; flex-direction: column; gap: 15px; max-height: 520px; overflow-y: auto; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--blue-accent); border-radius: 5px; }
        
        .history-item { padding: 18px 25px; border-radius: 12px; font-size: 28px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; animation: fadeIn 0.4s ease; transition: 0.3s; }
        .history-item.latest { border-color: var(--gold); box-shadow: 0 0 15px var(--gold-glow); background: rgba(212, 175, 55, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* POPUP KẾT QUẢ 3 GIÂY */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(6, 15, 30, 0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s ease;
        }
        .result-overlay.active { opacity: 1; pointer-events: all; }
        
        .result-modal {
            background: linear-gradient(135deg, #0f172a 0%, #060f1e 100%);
            border: 2px solid var(--gold); border-radius: 24px;
            padding: 40px 60px; text-align: center;
            transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(59, 130, 246, 0.1);
        }
        .result-overlay.active .result-modal { transform: scale(1); }
        .result-title { font-size: 40px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
        .result-title.win { color: var(--success); text-shadow: 0 0 25px rgba(16, 185, 129, 0.5); }
        .result-title.lose { color: var(--danger); text-shadow: 0 0 25px rgba(244, 63, 94, 0.5); }
        .result-dice-display { display: flex; gap: 20px; justify-content: center; font-size: 65px; margin-bottom: 25px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); }
        .result-money { font-size: 38px; font-family: 'Roboto Mono', monospace; font-weight: 700; margin-bottom: 20px; }
        .result-money.win { color: var(--success); }
        .result-money.lose { color: var(--danger); }
        .result-hint { font-size: 13px; color: var(--text-muted); font-style: italic; opacity: 0.6; }

        .toast-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .toast { background: rgba(15, 23, 42, 0.98); border-left: 4px solid var(--blue-accent); padding: 15px 25px; border-radius: 8px; color: white; font-size: 15px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.6); transform: translateX(120%); transition: 0.4s; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); }
        .toast.show { transform: translateX(0); }

        @media (max-width: 950px) {
            .main-container { flex-direction: column; align-items: center; gap: 20px; }
            .sidebar-history { width: 100%; max-width: 800px; order: 2; }
            .history-list { flex-direction: row; overflow-x: auto; max-height: none; padding-bottom: 10px; }
            .history-item { font-size: 22px; padding: 10px 20px; }
            .game-area { width: 100%; order: 1; }
            .betting-board { grid-template-columns: repeat(2, 1fr); }
            .dice { width: 65px; height: 65px; font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="navbar glass-panel">
        <a id="btn-back-lobby" class="btn-back"><span>◀</span> TRANG CHỦ</a>
        <div class="balance-container">
            <div class="balance-box" id="global-balance">0</div>
        </div>
    </div>

    <div class="main-container">
        
        <div class="game-area">
            <div class="status-board glass-panel" id="status-board">
                <div class="status-text" id="status-text">XIN MỜI ĐẶT CƯỢC</div>
                <div class="timer-wrapper">
                    <div class="timer-bar-bg">
                        <div class="timer-bar-fill" id="timer-fill"></div>
                    </div>
                    <div class="timer-number" id="timer-num">30s</div>
                </div>
            </div>

            <div class="dice-container glass-panel" id="dice-container">
                <div class="dice" id="dice-1">❓</div>
                <div class="dice" id="dice-2">❓</div>
                <div class="dice" id="dice-3">❓</div>
            </div>

            <div class="chip-selector" id="chip-selector">
                <div class="chip active" data-val="10000">10K</div>
                <div class="chip" data-val="50000">50K</div>
                <div class="chip" data-val="100000">100K</div>
                <div class="chip" data-val="500000">500K</div>
                <div class="chip" data-val="1000000">1M</div>
            </div>

            <div class="betting-board" id="betting-board">
                <div class="bet-cell glass-panel" onclick="placeBet('bau')"><div class="cell-icon">🍐</div><div class="cell-name">Bầu</div><div class="bet-amount" id="bet-bau">0</div></div>
                <div class="bet-cell glass-panel" onclick="placeBet('cua')"><div class="cell-icon">🦀</div><div class="cell-name">Cua</div><div class="bet-amount" id="bet-cua">0</div></div>
                <div class="bet-cell glass-panel" onclick="placeBet('tom')"><div class="cell-icon">🦐</div><div class="cell-name">Tôm</div><div class="bet-amount" id="bet-tom">0</div></div>
                <div class="bet-cell glass-panel" onclick="placeBet('ca')"><div class="cell-icon">🐟</div><div class="cell-name">Cá</div><div class="bet-amount" id="bet-ca">0</div></div>
                <div class="bet-cell glass-panel" onclick="placeBet('ga')"><div class="cell-icon">🐓</div><div class="cell-name">Gà</div><div class="bet-amount" id="bet-ga">0</div></div>
                <div class="bet-cell glass-panel" onclick="placeBet('nai')"><div class="cell-icon">🦌</div><div class="cell-name">Nai</div><div class="bet-amount" id="bet-nai">0</div></div>
            </div>

            <div class="controls">
                <button class="btn-clear" id="btn-clear" onclick="clearBets()">Hoàn tác cược</button>
            </div>
        </div>

        <div class="sidebar-history">
            <div class="history-board glass-panel">
                <div class="history-title">💎 BẢNG SOI CẦU 💎</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>

    </div>

    <div class="result-overlay" id="result-overlay" onclick="closeResultPopup()">
        <div class="result-modal">
            <h2 class="result-title" id="result-title">KẾT QUẢ</h2>
            <div class="result-dice-display" id="result-dice-display"></div>
            <div class="result-money" id="result-money-text"></div>
            <p class="result-hint">Chạm để tiếp tục</p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

<script>
    const ANIMALS = ['bau', 'cua', 'tom', 'ca', 'ga', 'nai'];
    const EMOJIS = { bau: '🍐', cua: '🦀', tom: '🦐', ca: '🐟', ga: '🐓', nai: '🦌' };
    
    const PHASES = {
        BETTING: { time: 30, name: "XIN MỜI ĐẶT CƯỢC", color: "var(--gold)" },
        ROLLING: { time: 5,  name: "ĐANG LẮC XÍ NGẦU", color: "var(--blue-accent)" },
        RESULT:  { time: 6,  name: "KẾT QUẢ PHIÊN", color: "var(--success)" }
    };

    let currentState = 'BETTING';
    let timeLeft = PHASES.BETTING.time;
    let currentChip = 10000;
    let bets = { bau: 0, cua: 0, tom: 0, ca: 0, ga: 0, nai: 0 };
    let rollInterval;
    let popupTimeout; 
    let gameHistory = [];

    document.addEventListener("DOMContentLoaded", () => {
        refreshBalance();
        setupChips();
        loadHistory(); 
        startGameLoop();

        document.getElementById('btn-back-lobby').addEventListener('click', function(e) {
            e.preventDefault();
            if (currentState === 'BETTING') clearBets(false);
            window.location.href = 'index.html';
        });
    });

    window.addEventListener('beforeunload', function() {
        if (currentState === 'BETTING') clearBets(false);
    });

    function loadHistory() {
        const historyList = document.getElementById('history-list');
        const savedHistory = localStorage.getItem('baucua_history');
        if (savedHistory) {
            gameHistory = JSON.parse(savedHistory);
            if (gameHistory.length > 0) {
                historyList.innerHTML = '';
                gameHistory.forEach((results, idx) => {
                    const newItem = document.createElement('div');
                    newItem.className = 'history-item' + (idx === 0 ? ' latest' : '');
                    newItem.innerHTML = `<span>${EMOJIS[results[0]]} ${EMOJIS[results[1]]} ${EMOJIS[results[2]]}</span>`;
                    historyList.appendChild(newItem);
                });
                return;
            }
        }
        historyList.innerHTML = `<div id="empty-history" style="color:var(--text-muted); font-size:14px; text-align:center; padding: 40px 0; font-style: italic;">Đang chờ dữ liệu...</div>`;
    }

    function startGameLoop() {
        setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) switchPhase();
        }, 1000);
    }

    function switchPhase() {
        if (currentState === 'BETTING') {
            currentState = 'ROLLING';
            timeLeft = PHASES.ROLLING.time;
            lockBoard(true);
            startRollingEffect();
            showToast("Hết thời gian cược!");
        } else if (currentState === 'ROLLING') {
            currentState = 'RESULT';
            timeLeft = PHASES.RESULT.time;
            stopRollingEffectAndShowResult();
        } else if (currentState === 'RESULT') {
            currentState = 'BETTING';
            timeLeft = PHASES.BETTING.time;
            resetTable();
            lockBoard(false);
            closeResultPopup(); 
        }
        updateTimerUI();
    }

    function updateTimerUI() {
        const statusText = document.getElementById('status-text');
        const timerFill = document.getElementById('timer-fill');
        const timerNum = document.getElementById('timer-num');
        statusText.innerText = PHASES[currentState].name;
        statusText.style.color = PHASES[currentState].color;
        const totalTime = PHASES[currentState].time;
        const percentage = Math.max(0, (timeLeft / totalTime) * 100);
        timerFill.style.width = percentage + "%";
        timerFill.style.backgroundColor = (currentState === 'BETTING' && timeLeft <= 10) ? "var(--danger)" : PHASES[currentState].color;
        timerNum.innerText = timeLeft + "s";
    }

    function lockBoard(isLocked) {
        const items = ['betting-board', 'chip-selector', 'btn-clear'];
        items.forEach(id => {
            const el = document.getElementById(id);
            if(isLocked) el.classList.add('locked'); else el.classList.remove('locked');
        });
    }

    function resetTable() {
        bets = { bau: 0, cua: 0, tom: 0, ca: 0, ga: 0, nai: 0 };
        [1,2,3].forEach(n => document.getElementById(`dice-${n}`).innerText = "❓");
        updateBoardUI();
    }

    function startRollingEffect() {
        const diceEls = [1,2,3].map(n => document.getElementById(`dice-${n}`));
        diceEls.forEach(d => d.classList.add('shake'));
        rollInterval = setInterval(() => {
            diceEls.forEach(d => d.innerText = EMOJIS[ANIMALS[Math.floor(Math.random() * 6)]]);
        }, 80);
    }

    function stopRollingEffectAndShowResult() {
        clearInterval(rollInterval);
        const diceEls = [1,2,3].map(n => document.getElementById(`dice-${n}`));
        diceEls.forEach(d => d.classList.remove('shake'));
        let res = [ANIMALS[Math.floor(Math.random()*6)], ANIMALS[Math.floor(Math.random()*6)], ANIMALS[Math.floor(Math.random()*6)]];
        diceEls.forEach((d, i) => d.innerText = EMOJIS[res[i]]);
        calculatePayout(res);
        updateHistory(res);
    }

    function calculatePayout(results) {
        let totalPayout = 0;
        let totalBet = Object.values(bets).reduce((a, b) => a + b, 0);
        if (totalBet === 0) return; 
        let counts = {};
        results.forEach(a => counts[a] = (counts[a] || 0) + 1);
        for (let a in bets) {
            if (bets[a] > 0 && counts[a]) {
                totalPayout += bets[a] + (bets[a] * counts[a]);
            }
        }
        if (totalPayout > 0) updateBalance(getBalance() + totalPayout);
        showResultPopup(totalPayout, totalBet, results);
    }

    function showResultPopup(payout, bet, res) {
        const overlay = document.getElementById('result-overlay');
        const title = document.getElementById('result-title');
        const moneyText = document.getElementById('result-money-text');
        document.getElementById('result-dice-display').innerHTML = `${EMOJIS[res[0]]} ${EMOJIS[res[1]]} ${EMOJIS[res[2]]}`;

        if (payout > 0) {
            title.innerText = "THẮNG LỚN"; title.className = "result-title win";
            moneyText.className = "result-money win"; moneyText.innerText = `+${payout.toLocaleString()}`;
        } else {
            title.innerText = "RẤT TIẾC"; title.className = "result-title lose";
            moneyText.className = "result-money lose"; moneyText.innerText = `-${bet.toLocaleString()}`;
        }

        overlay.classList.add('active');
        clearTimeout(popupTimeout);
        /* FIX: 3 GIÂY TỰ TẮT */
        popupTimeout = setTimeout(closeResultPopup, 3000);
    }

    function closeResultPopup() {
        document.getElementById('result-overlay').classList.remove('active');
        clearTimeout(popupTimeout);
    }

    function updateHistory(res) {
        const historyList = document.getElementById('history-list');
        const empty = document.getElementById('empty-history'); if(empty) empty.remove();
        historyList.querySelectorAll('.history-item').forEach(i => i.classList.remove('latest'));
        const newItem = document.createElement('div');
        newItem.className = 'history-item latest';
        newItem.innerHTML = `<span>${EMOJIS[res[0]]} ${EMOJIS[res[1]]} ${EMOJIS[res[2]]}</span>`;
        historyList.prepend(newItem);
        gameHistory.unshift(res);
        if (gameHistory.length > 15) { gameHistory.pop(); historyList.removeChild(historyList.lastChild); }
        localStorage.setItem('baucua_history', JSON.stringify(gameHistory));
    }

    function getBalance() { return parseInt(localStorage.getItem('userBalance')) || 0; }
    function updateBalance(amt) { localStorage.setItem('userBalance', amt); refreshBalance(); }
    function refreshBalance() { document.getElementById('global-balance').innerText = getBalance().toLocaleString(); }

    function setupChips() {
        document.querySelectorAll('.chip').forEach(c => {
            c.addEventListener('click', function() {
                if (currentState !== 'BETTING') return;
                document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                currentChip = parseInt(this.getAttribute('data-val'));
            });
        });
    }

    function placeBet(animal) {
        if (currentState !== 'BETTING') return showToast("Bàn cược đang đóng!");
        let bal = getBalance();
        if (bal < currentChip) return showToast("Không đủ số dư!");
        updateBalance(bal - currentChip);
        bets[animal] += currentChip;
        updateBoardUI();
    }

    function clearBets(msg = true) {
        if (currentState !== 'BETTING') return;
        let refund = Object.values(bets).reduce((a,b) => a+b, 0);
        if (refund > 0) {
            updateBalance(getBalance() + refund);
            bets = { bau: 0, cua: 0, tom: 0, ca: 0, ga: 0, nai: 0 };
            updateBoardUI();
            if (msg) showToast(`Đã hoàn tác: +${refund.toLocaleString()}`);
        }
    }

    function updateBoardUI() {
        for (let a in bets) {
            const el = document.getElementById(`bet-${a}`);
            el.innerText = bets[a] > 0 ? (bets[a] >= 1000000 ? (bets[a]/1000000)+'M' : (bets[a]/1000)+'K') : "0";
            if (bets[a] > 0) el.parentElement.classList.add('has-bet'); else el.parentElement.classList.remove('has-bet');
        }
    }

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<span>🔔</span> <span>${msg}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 2500);
    }
</script>
</body>
</html>
