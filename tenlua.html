<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tên Lửa - Vũ Trụ</title>
    <style>
        :root {
            --primary: #10b981; /* Xanh ngọc */
            --danger: #ef4444; /* Đỏ */
            --warning: #f59e0b; /* Vàng cam */
            --bg-dark: #0b0f19;
            --panel-bg: rgba(26, 30, 46, 0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            text-align: center;
            padding: 20px 10px;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header a { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .header a:hover { text-shadow: 0 0 10px var(--primary); }
        .balance-text { color: #fcd34d; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px rgba(252, 211, 77, 0.4); }

        /* LỊCH SỬ NỔ */
        .history-area {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none; /* Firefox */
        }
        .history-area::-webkit-scrollbar { display: none; } /* Chrome */

        .history-item {
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            min-width: 55px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
        .history-high { background: rgba(16, 185, 129, 0.2); color: var(--primary); border: 1px solid var(--primary); } 
        .history-low { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); } 

        /* KHU VỰC GAME - PARALLAX */
        .game-area {
            background: linear-gradient(180deg, #090f1e 0%, #171738 100%);
            height: 480px; /* To hơn */
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Lớp Bầu Trời Xanh (Sẽ mờ dần khi bay cao) */
        .sky-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #5bb4eb 0%, #a6d6f5 100%);
            transition: opacity 2.5s ease-in-out;
            z-index: 1;
        }

        /* Lớp Mây */
        .clouds-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 200 200"><circle cx="50" cy="50" r="30" fill="white" opacity="0.3"/><circle cx="150" cy="120" r="40" fill="white" opacity="0.2"/><circle cx="180" cy="30" r="25" fill="white" opacity="0.25"/><circle cx="20" cy="160" r="35" fill="white" opacity="0.15"/></svg>') repeat;
            transition: opacity 2s ease;
            z-index: 2;
        }

        /* Các Lớp Sao Ngẫu Nhiên (Parallax) */
        .stars-bg-1, .stars-bg-2 {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            z-index: 0;
        }
        
        /* Sao nhỏ, bay chậm */
        .stars-bg-1 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="20" cy="30" r="0.8" fill="white" opacity="0.6"/><circle cx="80" cy="120" r="1" fill="white" opacity="0.4"/><circle cx="150" cy="40" r="0.5" fill="white" opacity="0.8"/><circle cx="190" cy="180" r="1.2" fill="white" opacity="0.5"/><circle cx="50" cy="160" r="0.6" fill="white" opacity="0.7"/><circle cx="110" cy="80" r="1" fill="white" opacity="0.3"/></svg>');
            background-size: 150px 150px;
        }

        /* Sao to sáng, bay nhanh hơn */
        .stars-bg-2 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="45" cy="80" r="1.5" fill="white" opacity="0.9"/><circle cx="160" cy="150" r="2" fill="white" opacity="0.8"/><circle cx="120" cy="20" r="1.2" fill="#fcd34d" opacity="0.7"/><circle cx="30" cy="190" r="1.8" fill="#a6d6f5" opacity="0.8"/></svg>');
            background-size: 250px 250px;
        }

        .scrolling-slow { animation: scrollBg 6s linear infinite; }
        .scrolling-fast { animation: scrollBg 3s linear infinite; }
        
        @keyframes scrollBg {
            from { background-position: 0 0; }
            to { background-position: 0 500px; } 
        }

        /* CENTER GROUP (Tên lửa & Chữ) */
        .center-flight-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px; 
            z-index: 10;
            width: 100%;
        }

        #rocket-wrapper { position: relative; transition: all 0.3s; }
        #rocket-emoji { font-size: 90px; display: inline-block; transform: rotate(-45deg); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }

        .floating { animation: floatEffect 1.5s ease-in-out infinite alternate; }
        @keyframes floatEffect {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .crashing { animation: crashEffect 0.6s forwards cubic-bezier(0.5, 0, 1, 1) !important; filter: grayscale(100%) brightness(40%); }
        @keyframes crashEffect {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(90deg); opacity: 0.8; filter: brightness(200%) hue-rotate(-50deg); }
            100% { transform: scale(0.5) translateY(100px) rotate(180deg); opacity: 0; }
        }

        /* Lửa tên lửa xịn hơn */
        .rocket-fire {
            display: none;
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 50px;
            background: radial-gradient(ellipse at top, #fff 0%, #ffeb3b 30%, #ff9800 60%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            animation: burn 0.05s infinite alternate;
            z-index: -1;
            filter: blur(1px) drop-shadow(0 0 10px #ff9800);
        }

        @keyframes burn {
            0% { transform: translateX(-50%) scaleY(1) scaleX(0.9); opacity: 0.8; }
            100% { transform: translateX(-50%) scaleY(1.3) scaleX(1.1); opacity: 1; }
        }

        .text-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 250px; }

        /* HỆ SỐ TO & GLOW */
        #multiplier {
            font-size: 110px;
            color: var(--primary); 
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.6), 0 5px 15px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        #status {
            font-size: 20px;
            font-weight: 600;
            color: #e2e8f0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 10px;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Nhảy dù được thiết lập để điều khiển từ JS */
        #parachute-container {
            position: absolute; font-size: 70px; display: none; z-index: 15;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transform: translate(-50%, -50%);
        }

        /* KHU VỰC ĐIỀU KHIỂN */
        .controls { 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .notif-box {
            background: rgba(0, 0, 0, 0.4);
            color: #fcd34d;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            text-align: center;
        }

        /* Nút Tắt (Presets) */
        .bet-presets { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .bet-presets button {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border: 1px solid rgba(16, 185, 129, 0.4);
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bet-presets button:hover { background: var(--primary); color: #fff; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); transform: translateY(-2px); }

        /* Ô Nhập Tiền Cực Mịn */
        .input-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; gap: 8px;}
        .input-group label { font-size: 14px; color: #94a3b8; font-weight: 600; padding-left: 5px; }
        
        input { 
            padding: 16px; 
            font-size: 18px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3);
            color: #fff;
            width: 220px; 
            text-align: center; 
            font-weight: bold;
            transition: 0.3s;
        }
        input::placeholder { color: #64748b; font-weight: normal; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); background: rgba(0,0,0,0.5); }
        
        /* Nút Hành Động To Bự */
        .action-area { display: flex; justify-content: center; gap: 20px; align-items: center; flex-wrap: wrap; }
        
        .btn-main { 
            padding: 18px 40px; 
            font-size: 20px; 
            cursor: pointer; 
            border: none; 
            border-radius: 14px; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: 0.2s; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.3); 
            letter-spacing: 1px;
        }
        .btn-main:active { transform: translateY(6px); box-shadow: none; }
        
        #btn-place-bet { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        #btn-place-bet:hover { box-shadow: 0 6px 0 #047857, 0 10px 20px rgba(16, 185, 129, 0.4); }

        #btn-cancel-bet { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; display: none; }
        #btn-cancel-bet:hover { box-shadow: 0 6px 0 #b91c1c, 0 10px 20px rgba(239, 68, 68, 0.4); }

        #btn-jump { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #fff; display: none; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        #btn-jump:hover { box-shadow: 0 6px 0 #b45309, 0 10px 20px rgba(245, 158, 11, 0.4); }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .center-flight-group { flex-direction: column; gap: 10px; }
            #rocket-emoji { font-size: 70px; }
            #multiplier { font-size: 80px; }
            input { width: 100%; box-sizing: border-box; }
            .input-group { width: 100%; }
            .btn-main { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html">🔙 Về Trang Chủ</a>
            <div class="balance-text">Số dư: <span id="global-balance">0</span> 💰</div>
        </div>

        <div class="history-area" id="history-box"></div>

        <div class="game-area" id="game-area">
            <div class="sky-layer" id="sky-layer"></div>
            <div class="clouds-layer" id="clouds-layer"></div>
            <div class="stars-bg-1" id="stars-bg-1"></div>
            <div class="stars-bg-2" id="stars-bg-2"></div>
            
            <div class="center-flight-group">
                <div id="rocket-wrapper">
                    <div id="rocket-emoji">🚀</div>
                    <div id="rocket-fire" class="rocket-fire"></div>
                </div>
                <div class="text-box">
                    <div id="multiplier">1.00x</div>
                    <div id="status">Đang chuẩn bị...</div>
                </div>
            </div>

            <div id="parachute-container">🪂</div>
        </div>

        <div class="controls">
            <div class="notif-box" id="notif-box">Hệ thống đang khởi động...</div>

            <div class="bet-presets">
                <button onclick="window.addBet(1000)">+ 1K</button>
                <button onclick="window.addBet(10000)">+ 10K</button>
                <button onclick="window.addBet(50000)">+ 50K</button>
                <button onclick="window.addBet(100000)">+ 100K</button>
                <button onclick="window.addBet(500000)">+ 500K</button>
                <button onclick="window.multiplyBet()">x2 Cược</button>
                <button onclick="window.halfBet()">1/2 Cược</button>
                <button onclick="window.clearBet()">Xóa</button>
                <button onclick="window.setBet(window.sysBalance)">All In</button>
            </div>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Số Tiền Cược</label>
                    <input type="number" id="bet-amount" placeholder="Nhập số tiền..." min="1000">
                </div>
                <div class="input-group">
                    <label>Tự Động Chốt Lời (Tùy chọn)</label>
                    <input type="number" id="auto-jump" placeholder="VD: 2.0" step="0.1" min="1.01">
                </div>
            </div>

            <div class="action-area">
                <button id="btn-place-bet" class="btn-main" onclick="window.placeBet()">🎯 Đặt Cược Ngay</button>
                <button id="btn-cancel-bet" class="btn-main" onclick="window.cancelBet()">❌ Hủy Cược</button>
                <button id="btn-jump" class="btn-main" onclick="window.jumpOut()">🪂 CHỐT LỜI NGAY</button>
            </div>
        </div>
    </div>

    <script>
        var sysBalance = parseInt(localStorage.getItem('userBalance'));
        if (isNaN(sysBalance) || sysBalance === null) { sysBalance = 5000000; }
        
        var isRunning = false, isPreparing = false, hasPlacedBet = false;
        var isPlaying = false, hasCashedOut = false;
        var currentMult = 1.0, crashPoint = 0;
        var gameTimer, preGameTimer;
        var waitTime = 10;
        
        if (typeof window.historyArr === 'undefined') {
            window.historyArr = [];
        }

        window.updateBalanceUI = function() { 
            document.getElementById('global-balance').innerText = sysBalance.toLocaleString();
            localStorage.setItem('userBalance', sysBalance);
        };

        window.notify = function(msg, type='info') {
            var box = document.getElementById('notif-box');
            box.innerText = msg;
            if (type === 'error') {
                box.style.borderColor = 'var(--danger)'; box.style.color = 'var(--danger)';
            } else if (type === 'success') {
                box.style.borderColor = 'var(--primary)'; box.style.color = 'var(--primary)';
            } else {
                box.style.borderColor = '#3b82f6'; box.style.color = '#fcd34d';
            }
        };

        window.renderHistory = function() {
            var historyBox = document.getElementById('history-box');
            historyBox.innerHTML = '';
            window.historyArr.forEach(function(m) {
                var span = document.createElement('div');
                var num = parseFloat(m);
                span.className = 'history-item ' + (num >= 2.0 ? 'history-high' : 'history-low');
                span.innerText = m;
                historyBox.appendChild(span);
            });
        };

        window.addBet = function(amount) {
            var inp = document.getElementById('bet-amount');
            inp.value = (parseInt(inp.value) || 0) + amount;
        };
        window.setBet = function(amount) { document.getElementById('bet-amount').value = amount; };
        window.multiplyBet = function() {
            var inp = document.getElementById('bet-amount');
            inp.value = (parseInt(inp.value) || 0) * 2;
        };
        window.halfBet = function() {
            var inp = document.getElementById('bet-amount');
            inp.value = Math.max(1000, Math.floor((parseInt(inp.value) || 0) / 2));
        };
        window.clearBet = function() { document.getElementById('bet-amount').value = ''; };

        window.placeBet = function() {
            if (hasPlacedBet) return window.notify("Bạn đã đặt cược rồi!", "error");
            var bet = parseInt(document.getElementById('bet-amount').value);
            if (isNaN(bet) || bet <= 0) return window.notify("⚠️ Nhập số tiền hợp lệ!", "error");
            if (bet > sysBalance) return window.notify("⚠️ Số dư không đủ!", "error");

            sysBalance -= bet;
            hasPlacedBet = true;
            window.updateBalanceUI();

            window.notify("Đã cược: " + bet.toLocaleString() + " 💰. Chờ tên lửa cất cánh!", "success");
            document.getElementById('btn-place-bet').style.display = 'none';
            document.getElementById('btn-cancel-bet').style.display = 'inline-block';
        };

        window.cancelBet = function() {
            if (!hasPlacedBet) return;
            sysBalance += parseInt(document.getElementById('bet-amount').value);
            hasPlacedBet = false;
            window.updateBalanceUI();
            window.notify("Đã hủy cược, hoàn lại tiền.", "info");
            document.getElementById('btn-place-bet').style.display = 'inline-block';
            document.getElementById('btn-cancel-bet').style.display = 'none';
        };

        window.getCrashPoint = function() {
            var cryptoArray = new Uint32Array(1);
            window.crypto.getRandomValues(cryptoArray);
            var r = cryptoArray[0] / 4294967296; 
            
            if (r <= 0.03) return 1.00;

            var crash = 0.97 / r;
            if (crash < 1.01) crash = 1.01;
            if (crash > 500) crash = 500 + (Math.random() * 100);

            return crash.toFixed(2);
        };

        window.startWaitCycle = function() {
            if (isRunning) return;
            isPreparing = true;
            waitTime = 10;
            
            document.getElementById('status').innerText = "Đang chuẩn bị ván mới... (" + waitTime + "s)";
            window.notify("Sẵn sàng cho ván tiếp theo... Đặt cược ngay!", "info");
            
            if (preGameTimer) clearInterval(preGameTimer);
            preGameTimer = setInterval(function() {
                waitTime--;
                document.getElementById('status').innerText = "Đang chuẩn bị ván mới... (" + waitTime + "s)";
                
                if (waitTime <= 0) {
                    clearInterval(preGameTimer);
                    isPreparing = false;
                    window.launchRocket();
                }
            }, 1000);
        };

        window.launchRocket = function() {
            isRunning = true;
            isPlaying = hasPlacedBet;
            hasCashedOut = false;
            currentMult = 1.0;
            crashPoint = parseFloat(window.getCrashPoint());

            document.getElementById('btn-place-bet').style.display = 'none';
            document.getElementById('btn-cancel-bet').style.display = 'none';

            if (isPlaying) {
                document.getElementById('btn-jump').style.display = 'inline-block';
                window.notify("🚀 Đang bay, canh chuẩn bấm CHỐT LỜI nhé!", "success");
            } else {
                window.notify("🚀 Ván này bạn đứng xem ngoài lề.", "info");
            }

            document.getElementById('rocket-wrapper').classList.add('floating');
            document.getElementById('rocket-fire').style.display = 'block';
            
            // Kích hoạt hiệu ứng bay
            document.getElementById('clouds-layer').classList.add('scrolling-fast');
            document.getElementById('stars-bg-1').classList.add('scrolling-slow');
            document.getElementById('stars-bg-2').classList.add('scrolling-fast');
            
            document.getElementById('status').innerText = isPlaying ? "Đang bay... Canh chốt lời!" : "Đang bay... (Khán giả)";

            if (crashPoint === 1.00) {
                window.handleCrash();
                return;
            }

            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(function() {
                var inc = currentMult > 3.0 ? 0.015 : 0.005;
                currentMult += inc;
                
                var multEl = document.getElementById('multiplier');
                multEl.innerText = currentMult.toFixed(2) + "x";

                // Hiệu ứng mờ dần bầu trời, hiện sao vũ trụ cực êm
                if (currentMult >= 2.5) {
                    document.getElementById('sky-layer').style.opacity = "0"; // Mờ bầu trời
                    document.getElementById('clouds-layer').style.opacity = "0"; // Mờ mây
                    document.getElementById('stars-bg-1').style.opacity = "1"; // Hiện sao nhỏ
                    document.getElementById('stars-bg-2').style.opacity = "1"; // Hiện sao to
                    
                    multEl.style.color = "var(--warning)"; 
                    multEl.style.textShadow = "0 0 30px rgba(245, 158, 11, 0.6), 0 5px 15px rgba(0,0,0,0.5)";
                }

                if (isPlaying && !hasCashedOut) {
                    var autoVal = parseFloat(document.getElementById('auto-jump').value);
                    if (!isNaN(autoVal) && autoVal > 1.0) {
                        if (currentMult >= autoVal) {
                            window.jumpOut(); 
                        }
                    }
                }

                if (currentMult >= crashPoint) {
                    currentMult = crashPoint; 
                    document.getElementById('multiplier').innerText = currentMult.toFixed(2) + "x";
                    clearInterval(gameTimer);
                    window.handleCrash();
                }
            }, 50);
        };

        window.handleCrash = function() {
            isRunning = false;
            hasPlacedBet = false; 

            var multEl = document.getElementById('multiplier');
            multEl.style.color = 'var(--danger)'; 
            multEl.style.textShadow = "0 0 30px rgba(239, 68, 68, 0.6), 0 5px 15px rgba(0,0,0,0.5)";
            document.getElementById('status').innerText = "BÙM! Tên lửa đã nổ.";

            window.historyArr.unshift(crashPoint.toFixed(2) + "x");
            if (window.historyArr.length > 8) window.historyArr.pop();
            window.renderHistory();
            
            if (isPlaying && !hasCashedOut) {
                window.notify("💥 NỔ RỒI! Bạn mất trắng vì không chịu nhảy sớm.", "error");
            } else if (isPlaying && hasCashedOut) {
                window.notify("💥 Nổ ở " + crashPoint.toFixed(2) + "x. May mà bạn nhảy rồi!", "info");
            } else {
                window.notify("💥 Tên lửa nổ ở mức " + crashPoint.toFixed(2) + "x.", "info");
            }
            
            var rocket = document.getElementById('rocket-wrapper');
            rocket.classList.remove('floating');
            rocket.classList.add('crashing');
            document.getElementById('rocket-fire').style.display = 'none';
            
            // Dừng chạy nền
            document.getElementById('clouds-layer').classList.remove('scrolling-fast');
            document.getElementById('stars-bg-1').classList.remove('scrolling-slow');
            document.getElementById('stars-bg-2').classList.remove('scrolling-fast');

            setTimeout(function() {
                window.resetGameRound();
                window.startWaitCycle();
            }, 4000);
        };

        window.jumpOut = function() {
            if (!isRunning || !isPlaying || hasCashedOut) return;

            hasCashedOut = true;
            var bet = parseInt(document.getElementById('bet-amount').value);
            var win = Math.floor(bet * currentMult);
            sysBalance += win;
            window.updateBalanceUI();

            window.notify("🎉 Chốt lời thành công: +" + win.toLocaleString() + " 💰 (Mức: " + currentMult.toFixed(2) + "x)", "success");

            var para = document.getElementById('parachute-container');
            var gameArea = document.getElementById('game-area');
            var rocket = document.getElementById('rocket-wrapper');
            
            // TÍNH TOÁN TỌA ĐỘ TÊN LỬA (Để dù nhảy thẳng từ tọa độ đó)
            var rocketRect = rocket.getBoundingClientRect();
            var gameRect = gameArea.getBoundingClientRect();
            var startTop = rocketRect.top - gameRect.top + (rocketRect.height / 2);
            var startLeft = rocketRect.left - gameRect.left + (rocketRect.width / 2);

            // Thiết lập vị trí ban đầu
            para.style.transition = 'none';
            para.style.left = startLeft + 'px';
            para.style.top = startTop + 'px';
            para.style.display = 'block';
            para.style.opacity = '1';

            // Hiệu ứng rơi xuống dưới
            setTimeout(function() {
                para.style.transition = 'top 2s ease-in, opacity 0.5s ease 1.5s'; 
                para.style.top = (gameArea.offsetHeight + 100) + 'px'; // Rơi vượt qua đáy game
                
                setTimeout(function() {
                    para.style.opacity = '0';
                    setTimeout(function() { para.style.display = 'none'; }, 500);
                }, 1500); 
            }, 50);

            document.getElementById('btn-jump').style.display = 'none';
            document.getElementById('status').innerText = "Đã chốt lời! Đứng xem nổ...";
        };

        window.resetGameRound = function() {
            document.getElementById('btn-place-bet').style.display = 'inline-block';
            document.getElementById('btn-cancel-bet').style.display = 'none';
            document.getElementById('btn-jump').style.display = 'none';
            
            document.getElementById('bet-amount').value = '';

            var multEl = document.getElementById('multiplier');
            multEl.style.color = 'var(--primary)';
            multEl.style.textShadow = "0 0 20px rgba(16, 185, 129, 0.6), 0 5px 15px rgba(0,0,0,0.5)";
            multEl.innerText = "1.00x";
            document.getElementById('status').innerText = "Nhập tiền và đặt cược";

            var rocket = document.getElementById('rocket-wrapper');
            rocket.classList.remove('crashing');
            
            // Khôi phục đồ họa
            document.getElementById('sky-layer').style.opacity = "1";
            document.getElementById('clouds-layer').style.opacity = "1";
            document.getElementById('stars-bg-1').style.opacity = "0";
            document.getElementById('stars-bg-2').style.opacity = "0";
        };

        // Init
        window.updateBalanceUI();
        window.renderHistory();
        window.startWaitCycle();
    </script>
</body>
</html>
