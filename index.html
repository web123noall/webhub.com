<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung Tâm Giải Trí</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c1831;
            --card-bg: #14213d;
            --accent: #00d2ff;
            --tai-color: #ff4757;
            --gold: #f1c40f;
            --success: #2ecc71;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            user-select: none;
            background-image: radial-gradient(circle at 50% 0%, #14213d 0%, #0c1831 60%);
            overflow-x: hidden;
        }

        .navbar {
            width: 100%; 
            max-width: 1100px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 20px 30px; 
            background: var(--card-bg);
            border-bottom: 4px solid var(--accent); 
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2); 
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .logo-text { 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px var(--accent); 
        }

        .balance-box { 
            color: var(--gold); 
            font-size: 28px; 
            font-weight: bold; 
            font-family: 'Roboto Mono', monospace; 
            background: rgba(0,0,0,0.4);
            padding: 10px 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .slogan { 
            font-size: 20px; 
            color: var(--tai-color); 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-style: italic; 
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); 
        }

        .main-title { 
            font-size: 36px; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 35px; 
            width: 100%; 
            max-width: 1050px; 
        }

        /* ----- PHẦN CSS CHỐNG LỆCH CHỮ ----- */
        .game-card {
            background: var(--card-bg); 
            border: 3px solid rgba(0, 210, 255, 0.2);
            border-radius: 30px; 
            height: 250px; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; /* Canh lề từ trên xuống để không bị đẩy */
            align-items: center; 
            text-decoration: none;
            color: #fff; 
            transition: all 0.3s ease; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            padding-top: 30px; /* Cố định khoảng cách từ trên xuống */
            padding-bottom: 25px; /* Cố định khoảng cách nút bấm */
            box-sizing: border-box;
        }

        .game-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .game-icon { 
            height: 80px; /* Khóa cứng chiều cao Icon */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px; 
            margin-bottom: 15px; 
        }

        .game-name { 
            height: 35px; /* Khóa cứng chiều cao Text */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px; /* KÍCH THƯỚC ĐỀU NHAU CHO TẤT CẢ */
            letter-spacing: 1px; 
            text-transform: uppercase; 
            white-space: nowrap; /* Cấm chữ rớt dòng */
        }

        .play-btn { 
            margin-top: auto; /* Tự động đẩy nút xuống đáy thẻ cho bằng nhau */
            padding: 8px 25px; 
            background: var(--accent); 
            color: #000; 
            border-radius: 10px; 
            font-size: 15px; 
            text-transform: uppercase; 
            opacity: 0; 
            transition: 0.3s; 
            font-weight: bold; 
        }
        /* ----------------------------------- */

        .game-card:hover .play-btn { 
            opacity: 1; 
        }

        .btn-reset-container { 
            margin-top: 50px; 
            margin-bottom: 20px; 
            text-align: center; 
            position: relative;
            width: 100%;
            max-width: 700px; 
        }
        
        .btn-reset {
            background: var(--tai-color); 
            color: #ffffff; 
            border: 2px solid #ffffff;
            padding: 12px 40px; 
            font-size: 20px; 
            font-family: 'Oswald', sans-serif; 
            font-weight: bold;
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
        }

        .btn-reset:hover {
            filter: brightness(1.2);
            transform: scale(1.03);
        }

        .btn-reset.disabled { 
            background: #555555 !important; 
            color: #999999 !important; 
            border-color: #444444 !important; 
            box-shadow: none !important; 
            cursor: not-allowed; 
            transform: none;
        }

        #cooldown-timer { 
            display: block; 
            font-size: 14px; 
            color: rgba(255,255,255,0.4); 
            margin-top: 8px; 
            font-family: 'Roboto Mono', monospace; 
        }

        .btn-chuyen-sinh {
            position: absolute; 
            right: 0; 
            bottom: 0;
            background: transparent; 
            color: rgba(255, 255, 255, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 4px 10px; 
            font-size: 11px; 
            border-radius: 5px; 
            cursor: pointer;
            text-transform: uppercase; 
            font-family: 'Oswald', sans-serif; 
            transition: 0.3s;
        }

        .btn-chuyen-sinh:hover { 
            color: rgba(255, 255, 255, 0.8); 
            border-color: rgba(255, 255, 255, 0.6); 
        }

        /* Modal & Hiệu ứng */
        .custom-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .custom-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--tai-color); padding: 50px; border-radius: 20px; text-align: center; max-width: 650px; transform: scale(0.8); transition: transform 0.3s ease; }
        .custom-modal.active .modal-content { transform: scale(1); }
        .modal-text { font-size: 26px; color: #fff; margin-bottom: 35px; text-transform: uppercase; line-height: 1.6; }
        .modal-btn { background: #555; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: bold; cursor: pointer; margin: 0 10px; transition: 0.2s; }
        .modal-btn:hover { filter: brightness(1.2); }
        .money-drop { position: fixed; font-size: 40px; z-index: 9999; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: explode 1.2s forwards; }
        @keyframes explode { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } }
        .shake-earthquake { animation: earthquake 0.15s infinite !important; }
        @keyframes earthquake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(4px,4px); } 50% { transform: translate(-4px, -4px); } 75% { transform: translate(4px, -4px); } }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-text">🌍 TRUNG TÂM GIẢI TRÍ</div>
        <div class="balance-box" id="global-balance">💰 5,000,000</div>
    </div>

    <div class="slogan">" Nghiện Là Dở Rồi ! "</div>
    <div class="main-title">- CHỌN TRÒ CHƠI -</div>

    <div class="game-grid">
        <a href="taixiu.html" class="game-card">
            <div class="game-icon">🎲</div>
            <div class="game-name">Tài Xỉu</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="oantuti.html" class="game-card">
            <div class="game-icon" style="font-size: 60px;">✌️✊🖐️</div>
            <div class="game-name">Oản Tù Tì</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="duavit.html" class="game-card">
            <div class="game-icon">🦆</div>
            <div class="game-name">Đua Vịt</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="tenlua.html" class="game-card">
            <div class="game-icon">🚀</div>
            <div class="game-name">Tên Lửa</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="baucua.html" class="game-card">
            <div class="game-icon" style="font-size: 50px;">🍐🦀🦐🐟</div> 
            <div class="game-name">Bầu Cua Tôm Cá</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="farm.html" class="game-card" id="card-farm">
            <div class="game-icon">🌾</div>
            <div class="game-name">Đi Mần</div> <div class="play-btn">LÀM NÔNG</div>
        </a>
        <a href="baccarat.html" class="game-card">
            <div class="game-icon">🃏</div>
            <div class="game-name">Baccarat</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="xocdia.html" class="game-card">
            <div class="game-icon">🪙</div>
            <div class="game-name">Xóc Đĩa</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
        <a href="nohu.html" class="game-card">
            <div class="game-icon">🎰</div>
            <div class="game-name">Nổ Hũ</div> <div class="play-btn">CHƠI NGAY</div>
        </a>
    </div>

    <div class="btn-reset-container">
        <button id="bocBatHoBtn" class="btn-reset" onclick="handleBocBatHo()">[ BỐC BÁT HỌ ]</button>
        <span id="cooldown-timer"></span>
        <button class="btn-chuyen-sinh" onclick="showChuyenSinhStep1()">Chuyển Sinh</button>
    </div>

    <div id="custom-modal" class="custom-modal">
        <div class="modal-content">
            <div id="modal-text" class="modal-text">Nội dung</div>
            <div id="modal-buttons" style="display: flex; justify-content: center; gap: 15px;"></div>
        </div>
    </div>

<script>
    const COOLDOWN_TIME = 30 * 60 * 1000; 
    let cooldownInterval;

    function refreshBalance() {
        let savedBalance = localStorage.getItem('userBalance');
        if (savedBalance === null || isNaN(savedBalance)) {
            localStorage.setItem('userBalance', 5000000);
            savedBalance = 5000000;
        }
        document.getElementById('global-balance').innerText = "💰 " + parseInt(savedBalance).toLocaleString();
    }

    function updateCooldownUI() {
        let lastTime = localStorage.getItem('lastBocBatHoTime');
        let btn = document.getElementById('bocBatHoBtn');
        let timerEl = document.getElementById('cooldown-timer');
        if (lastTime) {
            let timePassed = Date.now() - parseInt(lastTime);
            if (timePassed < COOLDOWN_TIME) {
                btn.classList.add('disabled'); btn.disabled = true;
                let timeLeft = COOLDOWN_TIME - timePassed;
                let m = Math.floor(timeLeft / 60000);
                let s = Math.floor((timeLeft % 60000) / 1000);
                timerEl.innerText = `Chờ ${m} phút ${s} giây để bốc tiếp...`;
                return true;
            }
        }
        btn.classList.remove('disabled'); btn.disabled = false;
        timerEl.innerText = "";
        return false;
    }

    function handleBocBatHo() {
        if (updateCooldownUI()) return;
        let currentBalance = parseInt(localStorage.getItem('userBalance')) || 0;
        localStorage.setItem('userBalance', currentBalance + 5000000);
        localStorage.setItem('lastBocBatHoTime', Date.now());
        refreshBalance();
        updateCooldownUI();
        clearInterval(cooldownInterval);
        cooldownInterval = setInterval(updateCooldownUI, 1000);
    }

    function showChuyenSinhStep1() {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-text').innerHTML = "⚠️ RESET TOÀN BỘ TIỀN VỀ 5 TRIỆU?";
        const btnArea = document.getElementById('modal-buttons');
        btnArea.innerHTML = `
            <button class="modal-btn" style="background:var(--tai-color)" onclick="thucHienChuyenSinh()">ĐỒNG Ý</button>
            <button class="modal-btn" onclick="document.getElementById('custom-modal').classList.remove('active')">HỦY</button>
        `;
        modal.classList.add('active');
    }

    function thucHienChuyenSinh() {
        localStorage.setItem('userBalance', 5000000);
        refreshBalance();
        document.querySelector('.modal-content').classList.add('shake-earthquake');
        setTimeout(() => {
            document.querySelector('.modal-content').classList.remove('shake-earthquake');
            document.getElementById('custom-modal').classList.remove('active');
        }, 1000);
    }

    document.addEventListener("DOMContentLoaded", () => {
        refreshBalance();
        updateCooldownUI();
        cooldownInterval = setInterval(updateCooldownUI, 1000);
    });
</script>
</body>
</html>
