<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Luxury Center</title>
    <style>
        :root {
            --bg-color: #050a18;
            --card-bg: #111b2d;
            --accent: #f1c40f;
            --tai-color: #d63031;
            --xiu-color: #2d3436;
            --success: #2ecc71;
            --select-glow: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 950px; 
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 2px solid #1e272e;
            text-align: center;
        }

        .balance-box {
            background: #000;
            padding: 8px 25px;
            border-radius: 50px;
            color: var(--accent);
            font-size: 18px; 
            font-weight: 700;
            margin-bottom: 25px;
            border: 2px solid var(--accent);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        #user-avatar-display { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }

        .avatar-picker { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .avatar-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; background: #fff; }
        .avatar-option.selected-avt { border-color: var(--accent); transform: scale(1.1); }

        #name-screen input { padding: 12px; font-size: 18px; border-radius: 10px; border: none; width: 70%; margin-bottom: 15px; text-align: center; outline: none;}

        .menu-btn {
            width: 100%; padding: 20px; margin: 10px 0;
            font-size: 22px; font-weight: 800; color: white;
            border: none; border-radius: 20px; cursor: pointer;
            background: linear-gradient(135deg, #0984e3, #6c5ce7);
        }

        #game-taixiu, #game-oan-tu-xi, #lobby { display: none; }
        .timer { background: #ff7675; padding: 8px 20px; border-radius: 50px; font-weight: 900; font-size: 20px; margin-bottom: 15px; display: inline-block;}
        
        .bet-input {
            background: #000; border: 2px solid #2f3640; color: #55efc4;
            padding: 10px; border-radius: 12px; width: 70%; font-size: 22px;
            text-align: center; margin-bottom: 20px; outline: none; font-weight: bold;
        }

        /* Nút game Oẳn Tù Tì được nâng cấp */
        .game-btn { 
            padding: 15px 5px; border: 4px solid transparent; border-radius: 15px; 
            font-weight: 900; cursor: pointer; color: white; transition: 0.2s; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        .game-btn span.icon { font-size: 30px; }
        .game-btn span.label { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .selected { border-color: var(--select-glow) !important; box-shadow: 0 0 15px var(--select-glow); transform: translateY(-3px); }

        .dice-box { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .dice { width: 60px; height: 60px; background: white; color: black; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; }
        .rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(5deg); } 100% { transform: rotate(-5deg); } }

        .history-list { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .ball { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;}
        .ball-T { background: var(--tai-color); } .ball-X { background: var(--xiu-color); }

        .res-highlight { font-size: 28px; font-weight: 900; color: var(--accent); min-height: 40px;}

        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; 
        }
        .result-popup { 
            background: #0b1622; width: 80%; max-width: 320px; 
            padding: 30px; border-radius: 20px; border: 2px solid #1e375a; 
            position: relative; text-align: center; 
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .win { color: #2ecc71; } .lose { color: #e74c3c; } .draw { color: #f1c40f; } .miss { color: #95a5a6; } .warning { color: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <div id="name-screen">
        <h3 style="color: var(--accent); margin-top: 0;">CHỌN NHÂN VẬT</h3>
        <div class="avatar-picker">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Felix" class="avatar-option selected-avt" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Aneka" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Max" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Sasha" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Liam" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Mia" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Noah" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Olivia" class="avatar-option" onclick="selectAvt(this)">
            <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Ethan" class="avatar-option" onclick="selectAvt(this)">
        </div>
        <input type="text" id="username" placeholder="Nhập tên...">
        <button class="menu-btn" onclick="startGame()">VÀO SÒNG</button>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="balance-box">
            <img id="user-avatar-display" src="">
            <span id="display-name">...</span> | <span id="money">5,000,000</span> Đ
        </div>

        <div id="lobby">
            <h2>TRÒ CHƠI</h2>
            <button class="menu-btn" onclick="showScreen('game-taixiu')">🎲 TÀI XỈU</button>
            <button class="menu-btn" onclick="showScreen('game-oan-tu-xi')">✌️ OẢN TÙ TÌ</button>
        </div>

        <div id="game-oan-tu-xi">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <button onclick="showScreen('lobby')" style="background:#636e72; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">←</button>
                <div class="timer" id="otx-timer">30s</div>
            </div>
            <input type="text" class="bet-input" id="otx-bet-val" placeholder="Tiền cược..." oninput="formatInput(this)">
            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <button id="btn-Keo" class="game-btn" style="flex:1; background:#0984e3;" onclick="betOTX('Kéo')">
                    <span class="icon">✌️</span>
                    <span class="label">KÉO</span>
                </button>
                <button id="btn-Bua" class="game-btn" style="flex:1; background:#e17055;" onclick="betOTX('Búa')">
                    <span class="icon">✊</span>
                    <span class="label">BÚA</span>
                </button>
                <button id="btn-Bao" class="game-btn" style="flex:1; background:#00b894;" onclick="betOTX('Bao')">
                    <span class="icon">✋</span>
                    <span class="label">BAO</span>
                </button>
            </div>
            <div id="otx-res" class="res-highlight">MỜI CƯỢC</div>
        </div>

        <div id="game-taixiu">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <button onclick="showScreen('lobby')" style="background:#636e72; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">←</button>
                <div class="timer" id="tx-timer">30s</div>
            </div>
            <input type="text" class="bet-input" id="tx-bet-val" placeholder="Tiền cược..." oninput="formatInput(this)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <button id="btn-tai" class="game-btn" style="background:var(--tai-color)" onclick="betTX('Tai')">TÀI</button>
                <button id="btn-xiu" class="game-btn" style="background:var(--xiu-color)" onclick="betTX('Xiu')">XỈU</button>
            </div>
            <div class="dice-box">
                <div id="d1" class="dice">1</div>
                <div id="d2" class="dice">1</div>
            </div>
            <div id="tx-res" class="res-highlight">CHỌN CỬA</div>
            <div class="history-list" id="tx-his"></div>
        </div>
    </div>
</div>

<div class="overlay" id="result-overlay" onclick="closeResult()">
    <div class="result-popup" onclick="event.stopPropagation()">
        <div id="popup-main-text" style="font-size: 35px; font-weight: 900; margin-bottom: 5px;"></div>
        <div id="popup-sub-text" style="font-size: 40px;"></div>
    </div>
</div>

<script>
    let money = 5000000;
    let txTimer = 30, otxTimer = 30;
    let txBet = null, otxBet = null;
    let txHistory = [];
    let selectedAvtUrl = "https://api.dicebear.com/8.x/avataaars/svg?seed=Felix";
    let rollInterval = null;

    const icons = { "Kéo": "✌️", "Búa": "✊", "Bao": "✋", "Tai": "🔴", "Xiu": "⚪" };

    function selectAvt(el) {
        document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('selected-avt'));
        el.classList.add('selected-avt');
        selectedAvtUrl = el.src;
    }

    function startGame() {
        let name = document.getElementById('username').value;
        if(!name) { showWebMsg("", "Vui lòng nhập tên!", "warning"); return; }
        document.getElementById('display-name').innerText = name;
        document.getElementById('user-avatar-display').src = selectedAvtUrl;
        document.getElementById('name-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        showScreen('lobby');
    }

    function showScreen(id) {
        ['lobby', 'game-taixiu', 'game-oan-tu-xi'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function formatInput(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        input.value = val ? parseInt(val).toLocaleString('en-US') : "";
    }

    function getVal(id) { return parseInt(document.getElementById(id).value.replace(/,/g, '')) || 0; }
    function updateMoney() { document.getElementById('money').innerText = money.toLocaleString('en-US'); }

    function showWebMsg(main, sub, type) {
        const overlay = document.getElementById('result-overlay');
        const mainEl = document.getElementById('popup-main-text');
        const subEl = document.getElementById('popup-sub-text');
        
        mainEl.innerText = main;
        subEl.innerText = sub;
        
        mainEl.style.display = main === "" ? "none" : "block";
        mainEl.className = type; 

        subEl.style.fontSize = (type === 'win' || type === 'lose' || type === 'draw') ? "45px" : "22px";
        subEl.className = (type === 'win' || type === 'lose' || type === 'draw') ? "" : type;

        overlay.style.display = 'flex';
        setTimeout(closeResult, 2500);
    }

    function closeResult() { document.getElementById('result-overlay').style.display = 'none'; }

    function betOTX(choice) {
        let amt = getVal('otx-bet-val');
        if(amt <= 0) { showWebMsg("", "Hãy nhập tiền cược!", "warning"); return; }
        if(otxBet && otxBet.choice === choice) {
            money += otxBet.amt; otxBet = null; resetBtns('otx');
            document.getElementById('otx-res').innerText = "HỦY CƯỢC";
        } else {
            if(otxBet) money += otxBet.amt;
            if(amt > money) { showWebMsg("", "Bạn không đủ tiền cược!", "warning"); return; }
            money -= amt; otxBet = { choice, amt };
            resetBtns('otx');
            document.getElementById('btn-' + (choice==='Kéo'?'Keo':choice==='Búa'?'Bua':'Bao')).classList.add('selected');
            document.getElementById('otx-res').innerHTML = `CHỌN: ${choice.toUpperCase()} ${icons[choice]}`;
        }
        updateMoney();
    }

    function betTX(side) {
        if(txTimer < 2) return;
        let amt = getVal('tx-bet-val');
        if(amt <= 0) { showWebMsg("", "Hãy nhập tiền cược!", "warning"); return; }
        if(txBet && txBet.side === side) {
            money += txBet.amt; txBet = null; resetBtns('tx');
            document.getElementById('tx-res').innerText = "HỦY CƯỢC";
        } else {
            if(txBet) money += txBet.amt;
            if(amt > money) { showWebMsg("", "Bạn không đủ tiền cược!", "warning"); return; }
            money -= amt; txBet = { side, amt };
            resetBtns('tx');
            document.getElementById('btn-' + side.toLowerCase()).classList.add('selected');
            document.getElementById('tx-res').innerText = `CHỌN: ${side.toUpperCase()}`;
        }
        updateMoney();
    }

    function resetBtns(game) {
        if(game==='otx') ['Keo','Bua','Bao'].forEach(c => document.getElementById('btn-'+c).classList.remove('selected'));
        else ['tai','xiu'].forEach(c => document.getElementById('btn-'+c).classList.remove('selected'));
    }

    setInterval(() => {
        txTimer--; otxTimer--;
        const isTXVisible = document.getElementById('game-taixiu').style.display==='block';
        const isOTXVisible = document.getElementById('game-oan-tu-xi').style.display==='block';

        if(isTXVisible) document.getElementById('tx-timer').innerText = txTimer + "s";
        if(isOTXVisible) document.getElementById('otx-timer').innerText = otxTimer + "s";

        if(txTimer === 5) {
            document.getElementById('d1').classList.add('rolling');
            document.getElementById('d2').classList.add('rolling');
            rollInterval = setInterval(() => {
                document.getElementById('d1').innerText = Math.floor(Math.random()*6)+1;
                document.getElementById('d2').innerText = Math.floor(Math.random()*6)+1;
            }, 100);
        }

        if(txTimer <= 0) {
            clearInterval(rollInterval);
            document.getElementById('d1').classList.remove('rolling');
            document.getElementById('d2').classList.remove('rolling');
            let r1 = Math.floor(Math.random()*6)+1, r2 = Math.floor(Math.random()*6)+1;
            document.getElementById('d1').innerText = r1; document.getElementById('d2').innerText = r2;
            let res = (r1+r2) > 6 ? "Tai" : "Xiu";
            
            if(txBet) {
                if(txBet.side === res) money += txBet.amt * 2;
                txBet = null;
            } else if(isTXVisible) {
                showWebMsg("", "Bạn đã bỏ lỡ ván Tài Xỉu!", "miss");
            }

            txHistory.push(res[0]); if(txHistory.length>8) txHistory.shift();
            updateHistoryUI();
            document.getElementById('tx-res').innerText = `KẾT QUẢ: ${res.toUpperCase()}`;
            resetBtns('tx'); txTimer = 31; updateMoney();
        }

        if(otxTimer <= 0) {
            if(otxBet) {
                let bot = ["Kéo","Búa","Bao"][Math.floor(Math.random()*3)];
                let win = (otxBet.choice==="Búa"&&bot==="Kéo") || (otxBet.choice==="Kéo"&&bot==="Bao") || (otxBet.choice==="Bao"&&bot==="Búa");
                let status = otxBet.choice === bot ? "HÒA" : win ? "THẮNG" : "THUA";
                let type = status === "THẮNG" ? "win" : status === "THUA" ? "lose" : "draw";

                if(status === "HÒA") money += otxBet.amt;
                else if(status === "THẮNG") money += otxBet.amt * 2;
                
                if(isOTXVisible) showWebMsg(status, `${icons[otxBet.choice]} VS ${icons[bot]}`, type);
                otxBet = null;
            } else if(isOTXVisible) {
                showWebMsg("", "Bạn đã bỏ lỡ ván Oẳn Tù Tì!", "miss");
            }
            otxTimer = 31; resetBtns('otx');
            document.getElementById('otx-res').innerText = "MỜI CƯỢC";
            updateMoney();
        }
    }, 1000);

    function updateHistoryUI() {
        const h = document.getElementById('tx-his'); h.innerHTML = '';
        txHistory.forEach(r => {
            let b = document.createElement('div'); b.className = 'ball ball-'+r; b.innerText = r; h.appendChild(b);
        });
    }
</script>
</body>
</html>
