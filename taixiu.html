<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Africa Edition - Boss Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0c1831;
            --card-bg: #14213d;
            --accent: #00d2ff;
            --title-color: #576574;
            --success: #2ecc71;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; 
            padding: 20px; box-sizing: border-box;
            user-select: none;
            overflow-x: hidden;
        }

        .casino-modal {
            position: relative;
            width: 1100px;
            height: auto;
            min-height: 600px;
            background: var(--card-bg);
            border: 4px solid var(--accent);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.1);
            display: flex; flex-direction: column;
            overflow: visible; 
            z-index: 1;
            transform: scale(1.5);
            transform-origin: center center;
            margin: 160px auto 120px auto;
        }

        .balance-box { 
            position: absolute; top: -100px; right: 20px; 
            color: var(--gold); font-size: 28px; font-weight: bold; font-family: 'Roboto Mono', monospace; 
            background: rgba(0, 0, 0, 0.85); padding: 10px 25px; border-radius: 15px;
            border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            z-index: 100; white-space: nowrap;
        }

        .sound-btn {
            position: absolute; top: -100px; left: 20px;
            background: rgba(0, 0, 0, 0.85); color: var(--accent); border: 2px solid var(--accent);
            padding: 10px 25px; border-radius: 15px; font-size: 24px; font-family: 'Oswald', sans-serif;
            font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transition: 0.3s;
        }
        .sound-btn:hover { background: var(--accent); color: #000; }

        #game-toast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); color: var(--accent); padding: 25px 50px; 
            border-radius: 20px; border: 3px solid var(--accent); z-index: 9999;
            display: none; font-weight: bold; font-size: 28px; text-transform: uppercase; 
            text-align: center; box-shadow: 0 0 60px rgba(0, 210, 255, 0.9); width: 80%; line-height: 1.4;
        }

        #dice-sum {
            position: absolute; top: 72%; left: 50%; transform: translate(-50%, -20px) scale(0.8);
            background: var(--gold); color: #000; padding: 8px 30px; border-radius: 20px;
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.9); z-index: 2000; pointer-events: none;
            opacity: 0; transition: all 0.3s ease-out;
        }
        .show-sum { opacity: 1 !important; transform: translate(-50%, 0) scale(1) !important; }

        .status-bar { 
            text-align: center; padding: 12px; font-size: 18px; color: #fff; text-transform: uppercase; 
            letter-spacing: 3px; background: rgba(0, 210, 255, 0.1); border-bottom: 2px solid rgba(0, 210, 255, 0.1);
            transition: all 0.3s; border-top-left-radius: 36px; border-top-right-radius: 36px;
        }

        @keyframes flash-red { 0%, 100% { color: #fff; text-shadow: none; } 50% { color: #ff4757; text-shadow: 0 0 15px #ff4757; } }
        .flash-red { animation: flash-red 1.2s infinite ease-in-out; }

        @keyframes flash-yellow { 0%, 100% { color: #fff; text-shadow: none; } 50% { color: #f1c40f; text-shadow: 0 0 15px #f1c40f; } }
        .flash-yellow { animation: flash-yellow 1.2s infinite ease-in-out; }

        @keyframes flash-green { 0%, 100% { color: #fff; text-shadow: none; } 50% { color: #2ecc71; text-shadow: 0 0 15px #2ecc71; } }
        .flash-green { animation: flash-green 1.2s infinite ease-in-out; }

        .play-area { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 30px 20px; position: relative; }

        .side { 
            width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; 
            text-align: center; cursor: pointer; transition: 0.3s; opacity: 0.2; border-radius: 40px; border: 4px solid transparent; 
        }
        .side.selected { opacity: 1; transform: scale(1.1); background: rgba(0, 210, 255, 0.05); }
        .side-title { font-size: 160px; font-weight: 900; color: #fff; -webkit-text-stroke: 1.5px var(--accent); text-shadow: 0 0 20px var(--accent); }

        .win-active { animation: blink-victory 0.8s infinite !important; opacity: 1 !important; }
        @keyframes blink-victory {
            0% { background: rgba(241, 196, 15, 0.15); border-color: rgba(241, 196, 15, 0.5); box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); filter: brightness(1); }
            50% { background: rgba(241, 196, 15, 0.4); border-color: var(--gold); box-shadow: 0 0 40px var(--gold), inset 0 0 15px rgba(255,255,255,0.2); filter: brightness(1.15); }
            100% { background: rgba(241, 196, 15, 0.15); border-color: rgba(241, 196, 15, 0.5); box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); filter: brightness(1); }
        }
        .win-active .side-title { color: var(--gold) !important; -webkit-text-stroke: 2px #fff; text-shadow: 0 0 20px #fff; }

        .bowl-center { 
            position: relative; width: 210px; height: 210px; background: #222; border-radius: 50%; border: 6px solid #333; 
            display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9); z-index: 100;
        }

        .dice-container { position: relative; width: 125px; height: 115px; }
        .dice { 
            position: absolute; width: 55px; height: 55px; background: #fff; color: #111; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 38px; font-weight: bold; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.5);
        }
        #d1 { top: 0; left: 50%; transform: translateX(-50%); } #d2 { bottom: 0; left: 0; } #d3 { bottom: 0; right: 0; }

        #plate { 
            position: absolute; width: 225px; height: 225px; background: radial-gradient(circle at 40% 40%, #3b3b3b 0%, #1a1a1a 60%, #050505 100%); 
            border-radius: 50%; z-index: 150; cursor: grab; border: 2px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            touch-action: none; transition: transform 0.05s ease-out, opacity 0.5s; display: flex; justify-content: center; align-items: center;
        }
        #plate::before { content: ''; position: absolute; width: 110px; height: 110px; border-radius: 50%; border: 4px solid #1a1a1a; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.6); background: linear-gradient(145deg, #222, #111); }
        #plate::after { content: ''; position: absolute; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #0a0a0a; background: #0f0f0f; box-shadow: inset 0 2px 10px #000; }

        .shaking { animation: plate-vibrate 0.07s infinite; }
        @keyframes plate-vibrate { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, -3px); } }

        .history-bar { display: flex; justify-content: center; gap: 8px; padding: 12px; background: rgba(255,255,255,0.1); min-height: 20px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .dot.tai { background: #000; box-shadow: 0 0 8px rgba(0,0,0,0.8); border: 1px solid #666; }
        .dot.xiu { background: #fff; box-shadow: 0 0 8px #fff; }

        .footer-bet { 
            padding: 20px 15px 30px 15px; background: rgba(0, 0, 0, 0.4); text-align: center; 
            position: relative; z-index: 50; border-top: 1px solid rgba(0, 210, 255, 0.2);
            border-bottom-left-radius: 36px; border-bottom-right-radius: 36px;
        }
        
        .bet-input-box { margin-bottom: 15px; }
        .bet-input { 
            background: #000; border: 2px solid var(--accent); color: #fff; padding: 10px; width: 280px; text-align: center; font-size: 26px; border-radius: 12px; font-family: 'Roboto Mono', monospace; transition: 0.3s;
        }
        .bet-confirmed { border-color: var(--success) !important; color: var(--success) !important; box-shadow: 0 0 15px var(--success); animation: pulse-success 1s infinite; }
        @keyframes pulse-success { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .btn { background: var(--accent); border: none; padding: 10px 15px; font-weight: bold; border-radius: 8px; cursor: pointer; color: #050a18; text-transform: uppercase; font-size: 15px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }

        .btn-allin { background: linear-gradient(145deg, #512da8, #311b92) !important; color: #d1c4e9 !important; font-size: 18px; padding: 12px 35px; border-radius: 30px; border: 2px solid #7e57c2; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), 0 5px 15px rgba(49, 27, 146, 0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: 0.3s; }
        .btn-confirm { background: linear-gradient(145deg, #d4af37, #b8860b) !important; color: #fff !important; font-size: 18px; padding: 12px 35px; border-radius: 30px; border: 2px solid #f1c40f; box-shadow: inset 0 2px 5px rgba(255,255,255,0.4), 0 5px 15px rgba(184, 134, 11, 0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.6); transition: 0.3s; }
        .btn-cancel { background: linear-gradient(145deg, #c62828, #b71c1c) !important; color: #ffcdd2 !important; font-size: 18px; padding: 12px 35px; border-radius: 30px; border: 2px solid #e53935; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), 0 5px 15px rgba(183, 28, 28, 0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: 0.3s; }
        .btn-allin:hover, .btn-confirm:hover, .btn-cancel:hover { filter: brightness(1.15); transform: translateY(-2px); }
        .btn-allin:active, .btn-confirm:active, .btn-cancel:active { transform: translateY(1px) scale(0.95); }

        .btn-home { position: absolute; top: 12px; left: 20px; background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 5px 15px; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: bold; text-decoration: none; cursor: pointer; transition: 0.2s; z-index: 100; }
        .btn-home:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div class="casino-modal">
    <button class="sound-btn" id="sound-btn" onclick="toggleSound()">🔊 BẬT ÂM</button>
    <div class="balance-box" id="balance">💰 0</div>
    <a href="index.html" class="btn-home">⬅ TRANG CHỦ</a>
    <div id="game-toast"></div>

    <div class="status-bar" id="status-text">MỜI ÔNG CHỦ ĐẶT CƯỢC...</div>

    <div class="play-area">
        <div class="side" id="side-tai" onclick="toggleSide('Tai')"><div class="side-title">TÀI</div></div>
        <div class="bowl-center">
            <div class="dice-container">
                <div id="d1" class="dice">?</div>
                <div id="d2" class="dice">?</div>
                <div id="d3" class="dice">?</div>
            </div>
            <div id="plate"></div>
        </div>
        <div class="side" id="side-xiu" onclick="toggleSide('Xiu')"><div class="side-title">XỈU</div></div>
        <div id="dice-sum">TỔNG: 0</div>
    </div>

    <div class="history-bar" id="history"></div>

    <div class="footer-bet">
        <div class="bet-input-box">
            <input type="text" class="bet-input" id="bet-val" value="0" readonly>
        </div>
        <div class="btn-group" id="money-btns" style="margin-bottom: 15px;">
            <button class="btn" onclick="addMoney(50000)">+50K</button>
            <button class="btn" onclick="addMoney(100000)">+100K</button>
            <button class="btn" onclick="addMoney(500000)">+500K</button>
            <button class="btn" onclick="addMoney(1000000)">+1M</button>
            <button class="btn" onclick="addMoney(5000000)">+5M</button>
        </div>
        <div class="btn-group" id="action-btns">
            <button class="btn btn-allin" id="btn-allin" onclick="addMoney('ALL')">ALL-IN</button>
            <button class="btn btn-confirm" id="btn-confirm" onclick="confirmBet()">ĐẶT CƯỢC</button>
            <button class="btn btn-cancel" id="btn-cancel" onclick="resetBet()">HỦY</button>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // ⚙️ CHÌA KHÓA ĐỒNG BỘ TIỀN (QUAN TRỌNG NHẤT)
    // =========================================================================
    // Ông chủ phải đổi chữ 'money' dưới đây thành TÊN BIẾN mà TRANG CHỦ đang dùng!
    // Các tên phổ biến thường là: 'money', 'balance', 'casino_money', 'coin'
    const KEY_TIEN = 'userBalance'; 
    // =========================================================================

    // Khởi tạo tiền từ LocalStorage đúng với KEY_TIEN
    let money = localStorage.getItem(KEY_TIEN) ? parseInt(localStorage.getItem(KEY_TIEN)) : 0;
    
    // Đảm bảo nếu lấy ra là NaN (lỗi số học) thì mặc định là 0
    if(isNaN(money)) money = 0;
    document.getElementById('balance').innerText = "💰 " + money.toLocaleString();

    let gameHistory = localStorage.getItem('casino_history') ? JSON.parse(localStorage.getItem('casino_history')) : [];
    document.getElementById('history').innerHTML = gameHistory.map(h => `<div class="dot ${h}"></div>`).join('');

    let timer = 26, betAmt = 0, betSide = null, result = "", isConfirmed = false, hasOpened = false;
    let isMuted = false;
    const plate = document.getElementById('plate'), toast = document.getElementById('game-toast'), sumDisplay = document.getElementById('dice-sum');
    const betInput = document.getElementById('bet-val');
    const statusText = document.getElementById('status-text');
    
    // Cơ chế ép đồng bộ tự động
    function syncMoney() {
        let storedMoney = localStorage.getItem(KEY_TIEN);
        if (storedMoney !== null) {
            let parsedMoney = parseInt(storedMoney);
            if (!isNaN(parsedMoney) && parsedMoney !== money && betAmt === 0 && !isConfirmed) {
                money = parsedMoney;
                document.getElementById('balance').innerText = "💰 " + money.toLocaleString();
            }
        }
    }
    
    // Quét liên tục để update mọi lúc
    window.addEventListener('storage', syncMoney);
    window.addEventListener('focus', syncMoney);
    setInterval(syncMoney, 500); 

    const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
    const shakeSound1 = new Audio('https://audio-previews.elements.envatousercontent.com/files/283685120/preview.mp3');
    const shakeSound2 = new Audio('https://audio-previews.elements.envatousercontent.com/files/283685412/preview.mp3');

    function toggleSound() {
        isMuted = !isMuted;
        document.getElementById('sound-btn').innerText = isMuted ? "🔇 TẮT ÂM" : "🔊 BẬT ÂM";
        winSound.muted = isMuted; shakeSound1.muted = isMuted; shakeSound2.muted = isMuted;
    }

    let isDragging = false, startX, startY;

    plate.onmousedown = (e) => { 
        if(timer > 8) return; 
        if(!isConfirmed) { showToast("⚠️ VUI LÒNG NHẤN ĐẶT CƯỢC<br>TRƯỚC KHI NẶN!"); return; }
        isDragging = true; startX = e.clientX; startY = e.clientY; 
    };

    window.onmousemove = (e) => {
        if (!isDragging) return;
        let dx = (e.clientX - startX) * 2.5; let dy = (e.clientY - startY) * 2.5;
        plate.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/5}deg)`;
        if (Math.abs(dx) > 150 || Math.abs(dy) > 150) openPlate();
    };

    window.onmouseup = () => { isDragging = false; if(!hasOpened) plate.style.transform = 'translate(0,0)'; };

    function resetStatusClasses() { statusText.classList.remove('flash-red', 'flash-yellow', 'flash-green'); }

    function openPlate() {
        if(hasOpened) return;
        plate.style.display = 'none'; hasOpened = true;
        resetStatusClasses(); 
        
        const winId = (result === "Tai") ? "side-tai" : "side-xiu";
        document.getElementById(winId).classList.add('win-active');
        
        let r1 = parseInt(document.getElementById('d1').innerText);
        let r2 = parseInt(document.getElementById('d2').innerText);
        let r3 = parseInt(document.getElementById('d3').innerText);
        let total = r1 + r2 + r3;
        sumDisplay.innerText = `TỔNG: ${total} ĐIỂM`; sumDisplay.classList.add('show-sum');
        setTimeout(() => { sumDisplay.classList.remove('show-sum'); }, 4000);

        addHistory(result.toLowerCase());

        if(isConfirmed && betSide === result) {
            money += betAmt * 2; updateUI(); showWinEffect();
        } else if (isConfirmed && betSide !== result) {
            setTimeout(() => { showToast("CÒN THỞ LÀ CÒN GỠ,<br>ÔNG CHỦ ƠI!"); }, 1000);
        }
    }

    function showWinEffect() {
        showToast(`💰 CHÚC MỪNG ÔNG CHỦ 💰<br>THẮNG CƯỢC +${(betAmt*2).toLocaleString()}`);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.5 } });
        if (!isMuted) {
            winSound.currentTime = 0; let playPromise = winSound.play();
            if (playPromise !== undefined) playPromise.catch(e => console.log(e));
        }
    }

    function showToast(msg) { toast.innerHTML = msg; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 3000); }

    function toggleSide(s) {
        if(timer <= 11 || isConfirmed) return; 
        betSide = (betSide === s) ? null : s;
        document.getElementById('side-tai').classList.toggle('selected', betSide === 'Tai');
        document.getElementById('side-xiu').classList.toggle('selected', betSide === 'Xiu');
    }

    function addMoney(v) { 
        if(timer > 11 && !isConfirmed) { 
            let amountToAdd = (v === 'ALL') ? money : v;
            if(money >= amountToAdd && amountToAdd > 0) { 
                betAmt += amountToAdd; money -= amountToAdd; updateUI(); 
            } else {
                showToast("⚠️ ÔNG CHỦ KHÔNG ĐỦ LÚA!");
            }
        } 
    }
    
    function resetBet() { 
        if(isConfirmed) return; 
        money += betAmt; betAmt = 0; betSide = null; isConfirmed = false; updateUI(); 
        document.querySelectorAll('.side').forEach(s => s.classList.remove('selected'));
        betInput.classList.remove('bet-confirmed');
    }

    // Cập nhật lại UI và lưu tiền vào đúng chìa khóa
    function updateUI() { 
        betInput.value = betAmt.toLocaleString(); 
        document.getElementById('balance').innerText = "💰 " + money.toLocaleString();
        localStorage.setItem(KEY_TIEN, money); 
    }

    function confirmBet() { 
        if(!betSide) return showToast("⚠️ ÔNG CHỦ QUÊN CHỌN<br>TÀI HOẶC XỈU RỒI!");
        if(betAmt <= 0) return showToast("⚠️ ÔNG CHỦ CHƯA ĐẶT TIỀN CƯỢC!");
        
        isConfirmed = true; betInput.classList.add('bet-confirmed');
        document.getElementById('money-btns').classList.add('disabled');
        document.getElementById('action-btns').classList.add('disabled');
        
        showToast("✅ ĐÃ XÁC NHẬN CƯỢC!<br>CHỜ LẮC XONG RỒI NẶN NHÉ.");
    }

    function addHistory(type) {
        gameHistory.push(type); if(gameHistory.length > 16) gameHistory.shift();
        document.getElementById('history').innerHTML = gameHistory.map(h => `<div class="dot ${h}"></div>`).join('');
        localStorage.setItem('casino_history', JSON.stringify(gameHistory));
    }

    setInterval(() => {
        timer--;
        if (timer > 11) {
            statusText.innerText = `THỜI GIAN CƯỢC: ${timer - 11}s`;
            resetStatusClasses(); statusText.classList.add('flash-red');
        } 
        else if (timer === 11) {
            if(!isConfirmed && betAmt > 0) {
                money += betAmt; betAmt = 0; betSide = null; updateUI();
                document.querySelectorAll('.side').forEach(s => s.classList.remove('selected'));
                showToast("⏰ HẾT GIỜ CƯỢC!<br>TIỀN ĐÃ ĐƯỢC HOÀN LẠI.");
            } else if (!isConfirmed && betAmt === 0) {
                betAmt = 0; betSide = null; updateUI();
                document.querySelectorAll('.side').forEach(s => s.classList.remove('selected'));
            }
            document.getElementById('money-btns').classList.add('disabled');
            document.getElementById('action-btns').classList.add('disabled');
            resetStatusClasses();
        }
        else if (timer < 11 && timer > 8) {
            statusText.innerText = `ĐANG LẮC...`;
            resetStatusClasses(); statusText.classList.add('flash-yellow');
            plate.classList.add('shaking');
            
            if (timer === 10 && !isMuted) {
                shakeSound1.currentTime = 0; shakeSound2.currentTime = 0;
                let playS1 = shakeSound1.play(); let playS2 = shakeSound2.play();
                if (playS1 !== undefined) playS1.catch(e => console.log(e));
                if (playS2 !== undefined) playS2.catch(e => console.log(e));
            }
        }
        else if (timer <= 8 && timer > 0) {
            statusText.innerText = `MỜI ÔNG CHỦ NẶN: ${timer}s`;
            resetStatusClasses(); statusText.classList.add('flash-green');
            plate.classList.remove('shaking');
            
            if (timer === 8) {
                shakeSound1.pause(); shakeSound2.pause();
                
                let r1 = Math.floor(Math.random()*6)+1, r2 = Math.floor(Math.random()*6)+1, r3 = Math.floor(Math.random()*6)+1;
                result = (r1+r2+r3 >= 11) ? "Tai" : "Xiu";
                document.getElementById('d1').innerText = r1; document.getElementById('d2').innerText = r2; document.getElementById('d3').innerText = r3;
            }
        }
        else {
            if(!hasOpened) openPlate();
            setTimeout(() => {
                if(timer <= 0) { 
                    timer = 26; hasOpened = false;
                    plate.style.display = 'flex'; plate.style.transform = 'translate(0,0)';
                    document.querySelectorAll('.side').forEach(s => s.classList.remove('win-active', 'selected'));
                    document.getElementById('d1').innerText = "?"; document.getElementById('d2').innerText = "?"; document.getElementById('d3').innerText = "?";
                    sumDisplay.classList.remove('show-sum'); resetStatusClasses();
                    
                    betAmt = 0; betSide = null; isConfirmed = false;
                    betInput.classList.remove('bet-confirmed');
                    document.getElementById('money-btns').classList.remove('disabled');
                    document.getElementById('action-btns').classList.remove('disabled');
                    updateUI();
                }
            }, 3000);
        }
    }, 1000);
</script>
</body>
</html>
